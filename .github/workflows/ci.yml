name: CI

# Trigger CI on push to main and on pull requests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs if a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # STAGE 0: COMMIT LINT (PRs only)
  # ============================================================

  commitlint:
    name: Stage 0 - Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --prefix project @commitlint/cli @commitlint/config-conventional
      - run: cd project && npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  # ============================================================
  # STAGE 1: LINT & TYPE CHECK
  # ============================================================

  lint-frontend:
    name: Stage 1 - Lint Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run type-check

  lint-admin:
    name: Stage 1 - Lint Admin (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Run ESLint
        working-directory: admin
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: admin
        run: npm run type-check

  # ============================================================
  # STAGE 2: UNIT TESTS
  # ============================================================

  unit-tests-podclaw:
    name: Stage 2 - Unit Tests PodClaw (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-admin]
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: podclaw/requirements.txt

      - name: Install dependencies
        working-directory: podclaw
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run pytest
        working-directory: podclaw
        run: pytest tests/ -v --cov=. --cov-report=term-missing
        env:
          # Mock environment variables for tests
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_KEY: mock_service_key
          ANTHROPIC_API_KEY: sk-ant-api-mock
          PRINTIFY_API_TOKEN: mock_token
          STRIPE_SECRET_KEY: sk_test_mock
          FAL_KEY: mock_fal_key
          GEMINI_API_KEY: AIza_mock_key

  unit-tests-mcp-server:
    name: Stage 2 - Unit Tests MCP Server (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-admin]
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Run vitest
        working-directory: mcp-server
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == 20
        with:
          name: mcp-coverage-node-${{ matrix.node-version }}
          path: mcp-server/coverage/
          retention-days: 7

  # ============================================================
  # STAGE 3: INTEGRATION TESTS
  # ============================================================

  integration-tests:
    name: Stage 3 - Integration Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests-podclaw, unit-tests-mcp-server]
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start development server
        working-directory: frontend
        run: npm run dev &
        env:
          # Mock environment variables for E2E tests
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_anon_key
          SUPABASE_SERVICE_KEY: mock_service_key
          STRIPE_SECRET_KEY: sk_test_mock
          STRIPE_WEBHOOK_SECRET: whsec_mock
          PRINTIFY_API_TOKEN: mock_token
          PRINTIFY_SHOP_ID: 123456
          PRINTIFY_WEBHOOK_SECRET: mock_webhook_secret
          ANTHROPIC_API_KEY: sk-ant-api-mock
          FAL_KEY: mock_fal_key
          GEMINI_API_KEY: AIza_mock_key

      - name: Wait for server to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000/api/ping; do sleep 2; done'

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e -- --project=chromium
        env:
          TEST_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: frontend/test-results/
          retention-days: 7

  # ============================================================
  # STAGE 4: DOCKER BUILD
  # ============================================================

  docker-build:
    name: Stage 4 - Docker Build Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env files for build
        run: |
          # Frontend .env.local
          cat > frontend/.env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=mock_anon_key
          SUPABASE_SERVICE_KEY=mock_service_key
          STRIPE_SECRET_KEY=sk_test_mock
          STRIPE_WEBHOOK_SECRET=whsec_mock
          PRINTIFY_API_TOKEN=mock_token
          PRINTIFY_SHOP_ID=123456
          PRINTIFY_WEBHOOK_SECRET=mock_webhook_secret
          ANTHROPIC_API_KEY=sk-ant-api-mock
          FAL_KEY=mock_fal_key
          GEMINI_API_KEY=AIza_mock_key
          EOF

          # Admin .env.local
          cat > admin/.env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=mock_anon_key
          SUPABASE_SERVICE_KEY=mock_service_key
          STRIPE_SECRET_KEY=sk_test_mock
          EOF

          # PodClaw .env
          cat > podclaw/.env << 'EOF'
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_SERVICE_KEY=mock_service_key
          ANTHROPIC_API_KEY=sk-ant-api-mock
          PRINTIFY_API_TOKEN=mock_token
          STRIPE_SECRET_KEY=sk_test_mock
          FAL_KEY=mock_fal_key
          GEMINI_API_KEY=AIza_mock_key
          EOF

      - name: Build Docker images
        run: docker compose build --no-cache
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Verify images were built
        run: |
          docker images | grep -E "(pod-frontend|pod-admin|pod-podclaw|pod-mcp-server)" || exit 1
          echo "✓ All Docker images built successfully"

      - name: Clean up
        if: always()
        run: docker compose down -v --remove-orphans
