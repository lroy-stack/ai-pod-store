<!DOCTYPE html>
<html lang="{{LOCALE}}" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* RESET */
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img { -ms-interpolation-mode:bicubic; border:0; height:auto; line-height:100%; outline:none; text-decoration:none; display:block; }
    body { margin:0; padding:0; width:100% !important; height:100% !important; }

    /* MOBILE */
    @media only screen and (max-width: 620px) {
      .stack { display:block !important; width:100% !important; max-width:100% !important; }
      .stack-pad { padding:10px 0 !important; }
      .fluid img { width:100% !important; height:auto !important; }
      .mob-pad { padding-left:16px !important; padding-right:16px !important; }
      .mob-center { text-align:center !important; }
      .mob-full-btn a { width:100% !important; display:block !important; }
    }

    /* DARK MODE */
    @media (prefers-color-scheme: dark) {
      .dark-bg { background-color:#111111 !important; }
      .dark-card { background-color:#1a1a1a !important; }
      .dark-text { color:#f0f0f0 !important; }
      .dark-muted { color:#aaaaaa !important; }
    }
    [data-ogsc] .dark-bg { background-color:#111111 !important; }
    [data-ogsc] .dark-card { background-color:#1a1a1a !important; }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4;" class="dark-bg">

<!-- Preheader (hidden preview text) -->
<div style="display:none; max-height:0; overflow:hidden; mso-hide:all;">
  {{PREHEADER}}&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;
</div>

<!-- OUTER WRAPPER -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
       width="100%" style="background-color:#f4f4f4;" class="dark-bg">
<tr><td align="center">


<!-- ===== HEADER (full-width dark bar) ===== -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
       width="100%" style="background-color:#0a0a0a;">
  <tr>
    <td align="center" style="padding:24px 20px;">
      <img src="{{BRAND_LOGO_MARK_URL}}"
           alt="{{BRAND_NAME}}" width="44" height="34"
           style="display:block; margin:0 auto 10px; border:0;" />
      <img src="{{BRAND_LOGO_WORDMARK_URL}}"
           alt="{{BRAND_NAME}}" width="160" height="20"
           style="display:block; margin:0 auto; border:0;" />
    </td>
  </tr>
</table>


<!-- ===== CONTENT (injected by template) ===== -->
{{CONTENT}}


<!-- ===== FOOTER (full-width dark bar) ===== -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
       width="100%" style="background-color:#0a0a0a;">
  <tr>
    <td align="center" style="padding:0;">
      <!--[if mso]><table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"><tr><td><![endif]-->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0"
             style="width:100%; max-width:600px;">
        <tr>
          <td align="center" class="mob-pad" style="padding:28px 30px; font-family:Arial,Helvetica,sans-serif;">

            <!-- Unsubscribe + legal links -->
            <p style="margin:0 0 12px; font-size:12px; line-height:18px; color:#888888;">
              <a href="{{BASE_URL}}/{{LOCALE}}/unsubscribe?email={{RECIPIENT_EMAIL}}" target="_blank"
                 style="color:#cccccc; text-decoration:underline;">{{UNSUBSCRIBE_TEXT}}</a>
              &nbsp;&middot;&nbsp;
              <a href="{{BASE_URL}}/{{LOCALE}}/privacy" target="_blank"
                 style="color:#cccccc; text-decoration:underline;">Privacy</a>
              &nbsp;&middot;&nbsp;
              <a href="{{BASE_URL}}/{{LOCALE}}/terms" target="_blank"
                 style="color:#cccccc; text-decoration:underline;">Terms</a>
            </p>

            <!-- CAN-SPAM physical address -->
            <p style="margin:0 0 8px; font-size:11px; color:#666666;">
              {{COMPANY_NAME}} &middot; {{COMPANY_CITY}}, {{COMPANY_COUNTRY}}
            </p>
            <p style="margin:0; font-size:11px; color:#555555;">
              &copy; {{YEAR}} {{BRAND_NAME}}. All rights reserved.
            </p>

          </td>
        </tr>
      </table>
      <!--[if mso]></td></tr></table><![endif]-->
    </td>
  </tr>
</table>


</td></tr>
</table>
<!-- END OUTER WRAPPER -->

</body>
</html>
