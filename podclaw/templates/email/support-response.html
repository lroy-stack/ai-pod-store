<!--
  {{BRAND_NAME}} Customer Support Response Template

  Variables:
    {{CUSTOMER_NAME}}    — customer first name or "there"
    {{RESPONSE_BODY}}    — the support response HTML
    {{ORIGINAL_SUBJECT}} — original email subject
    {{LOCALE}}           — en, es, de
-->
<h2 style="margin:0 0 16px;font-size:20px;color:#1a1a1a;">{{GREETING}}</h2>

<div style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#333333;">
  {{RESPONSE_BODY}}
</div>

<div style="margin:24px 0;padding:16px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;">
  <p style="margin:0;font-size:13px;color:#6b7280;">
    {{HELP_TEXT}}
  </p>
</div>

<p style="margin:0;font-size:14px;color:#6b7280;">
  {{SIGNATURE}}
</p>
