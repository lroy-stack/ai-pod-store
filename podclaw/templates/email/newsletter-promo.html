<!--
  Newsletter Template — Rich Product Email

  This file is injected as {{CONTENT}} in layout.html.
  The agent MUST use this template — do NOT compose HTML from scratch.

  Replace ALL {{VARIABLE}} placeholders with real data from the database.

  Variables:
    {{HERO_IMAGE_URL}}      — products.images[0].src (full HTTPS URL)
    {{HERO_PRODUCT_NAME}}   — products.title
    {{HERO_PRODUCT_PRICE}}  — formatted EUR price (e.g., "34,99 EUR")
    {{HERO_LINK}}           — https://yourdomain.com/{locale}/shop
    {{HEADLINE}}            — main headline (locale-aware)
    {{BODY}}                — promotional body text (1-3 sentences)
    {{RECIPIENT_NAME}}      — subscriber name or "there"/"amigo"/"Freund"
    {{PRODUCT_1_IMAGE}}     — second product image URL
    {{PRODUCT_1_NAME}}      — second product title
    {{PRODUCT_1_PRICE}}     — second product price EUR
    {{PRODUCT_1_LINK}}      — https://yourdomain.com/{locale}/shop
    {{PRODUCT_2_IMAGE}}     — third product image URL
    {{PRODUCT_2_NAME}}      — third product title
    {{PRODUCT_2_PRICE}}     — third product price EUR
    {{PRODUCT_2_LINK}}      — https://yourdomain.com/{locale}/shop
    {{DISCOUNT_CODE}}       — coupon code (e.g., BIGDEAL)
    {{DISCOUNT_TEXT}}       — discount description (locale-aware)
    {{CTA_TEXT}}            — button text: "Shop Now"/"Comprar ahora"/"Jetzt kaufen"
    {{CTA_URL}}             — https://yourdomain.com/{locale}/shop
-->


<!-- ===== HERO IMAGE (full-width, clickable) ===== -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
       width="100%" style="background-color:#0a0a0a;">
  <tr>
    <td align="center" style="padding:0;">
      <a href="{{HERO_LINK}}" target="_blank" style="text-decoration:none;">
        <img src="{{HERO_IMAGE_URL}}"
             alt="{{HERO_PRODUCT_NAME}}"
             width="600"
             style="display:block; width:100%; max-width:600px; height:auto; border:0;"
        />
      </a>
    </td>
  </tr>
</table>


<!-- ===== GREETING + INTRO (centered 600px) ===== -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
       width="100%" style="background-color:#ffffff;" class="dark-card">
  <tr>
    <td align="center" style="padding:0;">
      <!--[if mso]><table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"><tr><td><![endif]-->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0"
             style="width:100%; max-width:600px;">
        <tr>
          <td class="mob-pad" style="padding:32px 30px 8px; font-family:Arial,Helvetica,sans-serif;">
            <h1 style="margin:0 0 16px; font-size:26px; line-height:32px; font-weight:700; color:#0a0a0a; text-align:center;" class="dark-text">
              {{HEADLINE}}
            </h1>
            <p style="margin:0 0 8px; font-size:15px; line-height:24px; color:#444444;" class="dark-muted">
              {{RECIPIENT_NAME}},
            </p>
            <p style="margin:0 0 24px; font-size:15px; line-height:24px; color:#444444;" class="dark-muted">
              {{BODY}}
            </p>
          </td>
        </tr>

        <!-- Hero product details -->
        <tr>
          <td class="mob-pad" style="padding:0 30px 24px; font-family:Arial,Helvetica,sans-serif; text-align:center;">
            <p style="margin:0 0 4px; font-size:18px; font-weight:700; color:#0a0a0a;" class="dark-text">
              {{HERO_PRODUCT_NAME}}
            </p>
            <p style="margin:0 0 16px; font-size:16px; color:#9a6a3a; font-weight:600;">
              {{HERO_PRODUCT_PRICE}}
            </p>
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;" class="mob-full-btn">
              <tr>
                <td align="center" style="border-radius:8px; background-color:#9a6a3a;">
                  <a href="{{HERO_LINK}}" target="_blank"
                     style="display:inline-block; padding:14px 36px; font-family:Arial,Helvetica,sans-serif; font-size:15px; font-weight:700; color:#ffffff; text-decoration:none; border-radius:8px; border:1px solid #9a6a3a;">
                    {{CTA_TEXT}}
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
      <!--[if mso]></td></tr></table><![endif]-->
    </td>
  </tr>
</table>


<!-- ===== FEATURED PRODUCTS (2-column, stackable on mobile) ===== -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
       width="100%" style="background-color:#f8f8f8;" class="dark-bg">
  <tr>
    <td align="center" style="padding:0;">
      <!--[if mso]><table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"><tr><td><![endif]-->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0"
             style="width:100%; max-width:600px;">

        <!-- Section heading -->
        <tr>
          <td class="mob-pad" style="padding:28px 30px 16px; font-family:Arial,Helvetica,sans-serif; text-align:center;">
            <h2 style="margin:0; font-size:20px; color:#0a0a0a;" class="dark-text">
              &#9733; More from {{BRAND_NAME}}
            </h2>
          </td>
        </tr>

        <!-- Product row -->
        <tr>
          <td class="mob-pad" style="padding:0 20px 28px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
              <tr>
                <!-- Product 1 -->
                <td class="stack" width="50%" valign="top" style="padding:0 10px;">
                  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                    <tr>
                      <td class="fluid" style="padding-bottom:12px;">
                        <a href="{{PRODUCT_1_LINK}}" target="_blank">
                          <img src="{{PRODUCT_1_IMAGE}}"
                               alt="{{PRODUCT_1_NAME}}"
                               width="260"
                               style="display:block; width:100%; max-width:260px; height:auto; border:0; border-radius:8px;"
                          />
                        </a>
                      </td>
                    </tr>
                    <tr>
                      <td style="font-family:Arial,Helvetica,sans-serif; text-align:center;">
                        <p style="margin:0 0 4px; font-size:15px; font-weight:700; color:#0a0a0a;" class="dark-text">
                          {{PRODUCT_1_NAME}}
                        </p>
                        <p style="margin:0 0 12px; font-size:14px; color:#9a6a3a; font-weight:600;">
                          {{PRODUCT_1_PRICE}}
                        </p>
                        <a href="{{PRODUCT_1_LINK}}" target="_blank"
                           style="display:inline-block; padding:10px 24px; background-color:#0a0a0a; color:#ffffff; font-family:Arial,Helvetica,sans-serif; font-size:13px; font-weight:700; text-decoration:none; border-radius:6px;">
                          {{CTA_TEXT}}
                        </a>
                      </td>
                    </tr>
                  </table>
                </td>

                <!-- Product 2 -->
                <td class="stack stack-pad" width="50%" valign="top" style="padding:0 10px;">
                  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                    <tr>
                      <td class="fluid" style="padding-bottom:12px;">
                        <a href="{{PRODUCT_2_LINK}}" target="_blank">
                          <img src="{{PRODUCT_2_IMAGE}}"
                               alt="{{PRODUCT_2_NAME}}"
                               width="260"
                               style="display:block; width:100%; max-width:260px; height:auto; border:0; border-radius:8px;"
                          />
                        </a>
                      </td>
                    </tr>
                    <tr>
                      <td style="font-family:Arial,Helvetica,sans-serif; text-align:center;">
                        <p style="margin:0 0 4px; font-size:15px; font-weight:700; color:#0a0a0a;" class="dark-text">
                          {{PRODUCT_2_NAME}}
                        </p>
                        <p style="margin:0 0 12px; font-size:14px; color:#9a6a3a; font-weight:600;">
                          {{PRODUCT_2_PRICE}}
                        </p>
                        <a href="{{PRODUCT_2_LINK}}" target="_blank"
                           style="display:inline-block; padding:10px 24px; background-color:#0a0a0a; color:#ffffff; font-family:Arial,Helvetica,sans-serif; font-size:13px; font-weight:700; text-decoration:none; border-radius:6px;">
                          {{CTA_TEXT}}
                        </a>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
      <!--[if mso]></td></tr></table><![endif]-->
    </td>
  </tr>
</table>


<!-- ===== DISCOUNT CTA (full-width dark section) ===== -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
       width="100%" style="background-color:#0a0a0a;">
  <tr>
    <td align="center" style="padding:0;">
      <!--[if mso]><table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"><tr><td><![endif]-->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0"
             style="width:100%; max-width:600px;">
        <tr>
          <td align="center" class="mob-pad" style="padding:32px 30px; font-family:Arial,Helvetica,sans-serif;">
            <p style="margin:0 0 8px; font-size:14px; color:#aaaaaa;">
              {{DISCOUNT_TEXT}}
            </p>
            <p style="margin:0 0 20px; font-size:28px; font-weight:700; color:#ffffff; letter-spacing:3px;">
              {{DISCOUNT_CODE}}
            </p>
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
              <tr>
                <td align="center" style="border-radius:8px; background-color:#9a6a3a;">
                  <a href="{{CTA_URL}}" target="_blank"
                     style="display:inline-block; padding:14px 36px; font-family:Arial,Helvetica,sans-serif; font-size:15px; font-weight:700; color:#ffffff; text-decoration:none; border-radius:8px; border:1px solid #9a6a3a;">
                    {{CTA_TEXT}}
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
      <!--[if mso]></td></tr></table><![endif]-->
    </td>
  </tr>
</table>
