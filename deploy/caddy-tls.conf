# Cloudflare Origin Certificate — Production Only
#
# This file is mounted into /etc/caddy/addons/ only in production mode.
# It configures TLS for all site blocks using the Cloudflare Origin Certificate.
#
# The Caddyfile imports /etc/caddy/addons/*.conf at the end.
# However, Caddy snippets can't be applied retroactively to existing blocks.
#
# Instead, we rely on Caddy's automatic TLS behavior:
# - When CADDY_SITE_ADDRESS=yourdomain.com (not http://), Caddy enables TLS automatically
# - With Cloudflare proxy in front, Caddy uses its internal self-signed cert by default
# - The Origin Certificate provides a trusted cert that Cloudflare validates in Full (Strict) mode
