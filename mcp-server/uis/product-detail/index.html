<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { padding: 4px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 480px) { .layout { grid-template-columns: 1fr; } }
    .gallery img.main { width: 100%; border-radius: 10px; aspect-ratio: 1; object-fit: cover; }
    .thumbs { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; }
    .thumbs img { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; border: 2px solid transparent; cursor: pointer; opacity: .6; transition: all .15s; }
    .thumbs img:hover, .thumbs img.active { border-color: var(--color-text-primary, currentColor); opacity: 1; }
    .details { display: flex; flex-direction: column; gap: 2px; }
    h1 { font-size: 20px; font-weight: 700; line-height: 1.25; letter-spacing: -.01em; }
    .price { font-size: 22px; font-weight: 700; margin-top: 6px; }
    .price-note { font-size: 11px; font-weight: 400; color: var(--color-text-secondary, inherit); opacity: .5; margin-left: 2px; }
    .shipping-badge { margin-top: 8px; font-size: 11px; color: var(--color-text-secondary, inherit); opacity: .65; }
    .desc { font-size: 13px; line-height: 1.6; margin-top: 10px; color: var(--color-text-secondary, inherit); opacity: .8; }
    .section { font-size: 11px; font-weight: 600; margin-top: 12px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; opacity: .5; }
    .variants { display: flex; flex-wrap: wrap; gap: 5px; }
    .rating { margin-top: 4px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .count { opacity: .5; font-size: 11px; }
    details { margin-top: 12px; }
    details summary { font-size: 11px; font-weight: 600; cursor: pointer; list-style: none; text-transform: uppercase; letter-spacing: .05em; opacity: .5; user-select: none; }
    details summary::marker { display: none; }
    .specs { margin-top: 6px; font-size: 12px; line-height: 1.7; opacity: .7; }
    .specs strong { opacity: .9; }
    .safety { margin-top: 10px; padding: 8px 10px; border-radius: 6px; font-size: 11px; line-height: 1.5; opacity: .55; border: 1px solid var(--color-border-primary, rgba(128,128,128,.15)); }
    .safety strong { opacity: .9; }
  </style>
</head>
<body>
  <div id="content"></div>
  <div class="empty" id="empty" style="display:none">Product not found</div>
  <script type="module" src="./app.ts"></script>
</body>
</html>
