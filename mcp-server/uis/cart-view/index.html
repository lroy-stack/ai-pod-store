<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { padding: 4px; }
    .cart-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .cart-header h2 { font-size: 15px; font-weight: 700; }
    .cart-header .count { font-size: 12px; opacity: .6; }
    .item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(128,128,128,.15); align-items: center; }
    .item:last-child { border-bottom: none; }
    .item img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-variant { font-size: 10px; opacity: .5; }
    .item-right { text-align: right; flex-shrink: 0; }
    .item-qty { font-size: 10px; opacity: .6; }
    .item-price { font-size: 13px; font-weight: 700; }
    .total { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(128,128,128,.15); }
    .total-label { font-size: 13px; opacity: .6; }
    .total-price { font-size: 18px; font-weight: 700; }
  </style>
</head>
<body>
  <div id="content"></div>
  <div class="empty" id="empty" style="display:none">Your cart is empty</div>
  <script type="module" src="./app.ts"></script>
</body>
</html>
